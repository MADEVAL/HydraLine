name: hydraline_workspace
publish_to: none

environment:
  sdk: ^3.9.0

workspace:
  - packages/hydraline
  - packages/hydraline_server
  - packages/hydraline_flutter
  - example

dev_dependencies:
  melos: ^8.0.0
  test: ^1.25.0

melos:
  scripts:
    analyze:
      description: Run `dart analyze` (strict) in every package and the repo tooling.
      steps:
        - analyze:packages
        - analyze:tool

    analyze:packages:
      description: Run `dart analyze` (strict) in every workspace package.
      run: dart run melos:melos exec --dir-exists=lib -- dart analyze --fatal-infos --fatal-warnings .

    analyze:tool:
      description: Run `dart analyze` (strict) on the root tool/ and test/ dirs.
      run: dart analyze --fatal-infos --fatal-warnings tool test

    format:
      description: Format all Dart code in place.
      run: dart format packages example tool test

    format:check:
      description: Verify formatting; non-zero exit if changes needed (CI gate).
      run: dart format --output=none --set-exit-if-changed packages example tool test

    test:dart:
      description: Run pure-Dart tests (core/server).
      run: dart run melos:melos exec --no-flutter --dir-exists=test -- dart test

    test:flutter:
      description: Run Flutter widget tests.
      run: dart run melos:melos exec --flutter --dir-exists=test -- flutter test

    test:server:
      description: Run only the hydraline_server suite (SSR/delivery invariants).
      run: dart run melos:melos exec --scope=hydraline_server -- dart test

    test:
      description: Run all unit/widget tests.
      steps:
        - test:dart
        - test:flutter

    test:coverage:
      description: Run tests with coverage and enforce per-package thresholds (I9).
      steps:
        - coverage:dart
        - coverage:dart:lcov
        - coverage:flutter

    coverage:dart:
      description: Collect coverage for pure-Dart packages.
      run: dart run melos:melos exec --no-flutter --dir-exists=test -- dart test --coverage=coverage

    coverage:dart:lcov:
      description: Convert pure-Dart coverage to LCOV.
      run: dart run melos:melos exec --no-flutter --dir-exists=test -- dart run coverage:format_coverage --lcov --in=coverage --out=coverage/lcov.info --report-on=lib

    coverage:flutter:
      description: Collect Flutter coverage (LCOV).
      run: dart run melos:melos exec --flutter --dir-exists=test -- flutter test --coverage

    test:golden:
      description: Run only golden-tagged tests (line endings normalized to \n).
      run: dart run melos:melos exec --dir-exists=test/goldens -- dart test --tags golden

    test:security:
      description: Property/fuzz XSS suite.
      run: dart run melos:melos exec --dir-exists=test/security -- dart test --tags security

    boundaries:
      description: Scan for forbidden imports across package boundaries (I1).
      steps:
        - boundaries:unit
        - boundaries:scan

    boundaries:unit:
      description: Unit-test the boundary scanner itself.
      run: dart test test/check_boundaries_test.dart

    boundaries:scan:
      description: Fail on forbidden imports in core/server lib/ (I1).
      run: dart tool/check_boundaries.dart

    audit:
      description: Build the example SSG output and audit what a crawler sees.
      steps:
        - audit:build
        - audit:check

    audit:build:
      description: Generate the example static site into example/TEMP/audit-dist.
      run: dart run melos:melos exec --scope=hydraline_example -- dart run hydraline_example:build hydraline.routes.yaml TEMP/audit-dist

    audit:check:
      description: Run the SEO audit CLI against the generated home page.
      run: dart run melos:melos exec --scope=hydraline_example -- dart run hydraline:audit TEMP/audit-dist/index.html

    precommit:
      description: Local superset of blocking CI gates.
      steps:
        - analyze
        - format:check
        - test
        - boundaries
        - audit

    e2e:
      description: Playwright browser tests for the island runtime (real Chrome).
      steps:
        - e2e:install
        - e2e:run

    e2e:install:
      description: Install the Playwright test runner (uses system Chrome).
      run: npm --prefix e2e install

    e2e:run:
      description: Run the island-runtime browser tests.
      run: npm --prefix e2e test

    e2e:engine:
      description: Real-engine browser tests - flutter build web + SSG overlay + Playwright.
      steps:
        - e2e:install
        - e2e:engine:build
        - e2e:engine:ssg
        - e2e:engine:run

    e2e:engine:build:
      description: Compile the example island bundle with the real Flutter engine.
      run: dart run melos:melos exec --scope=hydraline_example -- flutter build web --target=lib/island_main.dart --output=TEMP/e2e-dist

    e2e:engine:ssg:
      description: Overlay the SSG pages and runtime JS onto the engine build.
      run: dart run melos:melos exec --scope=hydraline_example -- dart run hydraline_example:build hydraline.routes.yaml TEMP/e2e-dist

    e2e:engine:run:
      description: Run the real-engine Playwright project.
      run: npm --prefix e2e run test:engine
