name: hydraline
description: >-
  SEO, SSR, SSG + islands for Flutter Web — pure-Dart core.
  DocumentNode tree, HTML serializer, SafeUrl, metadata, JSON-LD,
  sitemap, robots, audit CLI. Use with hydraline_server (SSR) or
  hydraline_flutter (widgets/SSG).
version: 0.0.8
repository: https://github.com/MADEVAL/HydraLine
homepage: https://leonidov.dev
issue_tracker: https://github.com/MADEVAL/HydraLine/issues
topics:
  - seo
  - ssr
  - flutter-web
  - html
  - prerender

environment:
  sdk: ^3.9.0

resolution: workspace

dependencies:
  html: ^0.15.4
  yaml: ^3.1.2

dev_dependencies:
  coverage: ^1.11.0
  lints: ^5.0.0
  test: ^1.25.0
