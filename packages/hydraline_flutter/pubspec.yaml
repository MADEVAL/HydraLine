name: hydraline_flutter
description: >-
  Flutter widgets + web runtime for Hydraline. Seo.* widgets,
  Island zones, IslandHost engine, SSG runner, L2 dispatcher
  + Service Worker. Re-exports hydraline core.
version: 0.0.10
repository: https://github.com/MADEVAL/HydraLine
homepage: https://leonidov.dev
issue_tracker: https://github.com/MADEVAL/HydraLine/issues
topics:
  - seo
  - flutter-web
  - hydration
  - islands
  - ssg

environment:
  sdk: ^3.9.0
  flutter: ">=3.35.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  html: ^0.15.4
  hydraline: ^0.0.10

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  test: ^1.25.0
