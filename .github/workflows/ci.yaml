name: CI

# Temporarily disabled: manual trigger only. Restore the push/pull_request
# triggers below to re-enable.
#
# on:
#   push:
#     branches: [main]
#   pull_request:
on:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-server:
    name: core+server (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: dart pub get
      - name: format:check
        run: dart run melos:melos run format:check
      - name: analyze
        run: dart run melos:melos run analyze
      - name: boundaries
        run: dart run melos:melos run boundaries
      - name: test (dart)
        run: dart run melos:melos run test:dart
      - name: golden
        run: dart run melos:melos run test:golden
      - name: security fuzz
        run: dart run melos:melos run test:security
      - name: coverage
        run: dart run melos:melos run test:coverage

  flutter:
    name: flutter ${{ matrix.flutter }}
    strategy:
      fail-fast: false
      matrix:
        flutter: ['3.35.0', '3.44.6']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter }}
      - run: dart pub get
      - name: flutter tests
        run: dart run melos:melos run test:flutter

  flutter-known-issue:
    name: flutter 3.41.x (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
      - run: dart pub get
      - name: flutter tests
        run: dart run melos:melos run test:flutter
